name: Daily AI blog post

on:
  schedule:
    # 06:00 UTC on Tuesday and Friday. GitHub cron is always UTC.
    - cron: '0 6 * * 2,5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article and featured image
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POST_MODEL: gpt-5.4-mini
          POST_EFFORT: low
          GENERATE_FEATURED_IMAGE: 'true'
          IMAGE_MODEL: gpt-image-2
          IMAGE_QUALITY: medium
          IMAGE_SIZE: 1536x1024
        run: node scripts/generate-post.mjs

      - name: Build site
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts src/assets/images/posts
          if git diff --cached --quiet; then
            echo "No generated article to commit."
            exit 0
          fi
          git commit -m "Add automated blog post: ${{ steps.generate.outputs.title }}"
          git push
